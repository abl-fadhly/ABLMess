<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;color:#2e2a29;-webkit-font-smoothing:antialiased}a{color:#21508c}a:hover{color:#193d6b}</style>
</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(to bottom right,#eeedec,#ffffff,#fdf1f2);padding:0 16px" data-screen-label="Login">
  <div style="width:100%;max-width:384px">
    <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:24px">
      <div style="height:48px;width:48px;border-radius:16px;background:#c11524;display:flex;align-items:center;justify-content:center;color:#ffffff;font-weight:700;font-size:20px;box-shadow:0 10px 15px -3px rgba(193,21,36,.3)">A</div>
      <h1 style="margin:16px 0 0;font-size:20px;font-weight:700;color:#2e2a29;letter-spacing:-0.01em">ABLMess</h1>
      <p style="margin:2px 0 0;font-size:14px;color:#877d78">Crew mess management</p>
    </div>

    <div style="background:#ffffff;border:1px solid #dddbd9;border-radius:16px;padding:24px;box-shadow:0 1px 2px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:16px">
      <div>
        <label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#877d78;margin-bottom:6px">Email</label>
        <input type="email" style="width:100%;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;padding:8px 12px;font-size:14px;color:#2e2a29;box-sizing:border-box;font-family:inherit">
      </div>
      <div>
        <label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#877d78;margin-bottom:6px">Password</label>
        <input type="password" style="width:100%;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;padding:8px 12px;font-size:14px;color:#2e2a29;box-sizing:border-box;font-family:inherit">
      </div>
      <a href="Dashboard.dc.html" style="display:inline-flex;align-items:center;justify-content:center;width:100%;border-radius:8px;font-weight:500;padding:8px 16px;font-size:14px;background:#c11524;color:#ffffff;border:none;cursor:pointer;box-shadow:0 1px 2px rgba(193,21,36,.25);text-decoration:none;box-sizing:border-box" style-hover="background:#9c111d">Sign in</a>
    </div>
  </div>
</div>

</x-dc>
</body>
</html>
