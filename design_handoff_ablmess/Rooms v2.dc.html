<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;background:#eeedec;color:#2e2a29;-webkit-font-smoothing:antialiased}a{color:#21508c}a:hover{color:#193d6b}</style>
</helmet>
<div style="min-height:100vh;display:flex;background:#eeedec" data-screen-label="Rooms v2">
  <dc-import style="align-self:stretch" name="Sidebar" active="rooms" hint-size="240px,100vh"></dc-import>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0">
    <main style="flex:1;padding:32px;max-width:1152px;width:100%;margin:0 auto;box-sizing:border-box">
      <div style="margin-bottom:28px">
        <h1 style="margin:0;font-size:24px;font-weight:700;color:#2e2a29;letter-spacing:-0.01em">Rooms</h1>
        <p style="margin:4px 0 0;font-size:14px;color:#877d78">Manage rooms and bed capacity per location</p>
      </div>

      <div style="display:grid;grid-template-columns:360px 1fr;gap:24px;align-items:start">
        <!-- Add Room -->
        <div style="background:#ffffff;border:1px solid rgba(221,219,217,.8);border-radius:12px;box-shadow:0 1px 2px rgba(221,219,217,.4);padding:24px;box-sizing:border-box">
          <h2 style="margin:0 0 16px;font-weight:600;color:#2e2a29;font-size:16px">Add Room</h2>
          <div style="display:flex;flex-direction:column;gap:14px">
            <div>
              <label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#877d78;margin-bottom:6px">Room name</label>
              <input type="text" placeholder="e.g. Room 106" style="width:100%;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;padding:8px 12px;font-size:14px;color:#2e2a29;box-sizing:border-box;font-family:inherit">
            </div>
            <div>
              <label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#877d78;margin-bottom:6px">Location</label>
              <select style="width:100%;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;padding:8px 12px;font-size:14px;color:#2e2a29;box-sizing:border-box;font-family:inherit">
                <option>Select a location</option>
                <option>Mess Jakarta</option>
                <option>Mess Surabaya</option>
                <option>Mess Batam</option>
              </select>
            </div>
            <div>
              <label style="display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#877d78;margin-bottom:6px">Number of beds</label>
              <div style="display:flex;align-items:center;gap:8px">
                <button onClick="{{ decBeds }}" style="height:36px;width:36px;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;color:#5c5551;font-size:16px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center" style-hover="background:#f8f7f7">−</button>
                <div style="flex:1;text-align:center;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;padding:8px 12px;font-size:14px;font-weight:600;color:#2e2a29;font-variant-numeric:tabular-nums">{{ bedCount }}</div>
                <button onClick="{{ incBeds }}" style="height:36px;width:36px;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;color:#5c5551;font-size:16px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center" style-hover="background:#f8f7f7">+</button>
              </div>
              <p style="margin:8px 0 0;font-size:12px;color:#877d78">Will create: {{ bedPreview }}</p>
            </div>
            <button style="display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-weight:500;padding:8px 16px;font-size:14px;background:#c11524;color:#ffffff;border:none;cursor:pointer;box-shadow:0 1px 2px rgba(193,21,36,.25);font-family:inherit" style-hover="background:#9c111d">Add Room</button>
          </div>
        </div>

        <!-- Rooms grid -->
        <div style="background:#ffffff;border:1px solid rgba(221,219,217,.8);border-radius:12px;box-shadow:0 1px 2px rgba(221,219,217,.4);padding:24px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap">
            <h2 style="margin:0;font-weight:600;color:#2e2a29;font-size:16px">All Rooms</h2>
            <div style="display:flex;gap:16px">
              <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#877d78"><span style="height:10px;width:10px;border-radius:3px;border:1.5px solid #c5c1be;background:#ffffff;box-sizing:border-box"></span>Free bed</span>
              <span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#877d78"><span style="height:10px;width:10px;border-radius:3px;background:#c68310"></span>Booked bed</span>
            </div>
          </div>

          <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
            <sc-for list="{{ filterChips }}" as="f" hint-placeholder-count="4">
              <button onClick="{{ f.onClick }}" style="{{ f.style }}">{{ f.label }}</button>
            </sc-for>
          </div>

          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px">
            <sc-for list="{{ roomCards }}" as="r" hint-placeholder-count="5">
              <div style="border:1px solid #dddbd9;border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
                  <div>
                    <p style="margin:0;font-size:15px;font-weight:600;color:#2e2a29">{{ r.name }}</p>
                    <p style="margin:2px 0 0;font-size:12px;color:#877d78">{{ r.meta }}</p>
                  </div>
                  <span style="{{ r.badgeStyle }}"><span style="{{ r.dotStyle }}"></span>{{ r.status }}</span>
                </div>
                <sc-if value="{{ r.hasBeds }}" hint-placeholder-val="{{ true }}">
                  <div style="display:flex;gap:6px;flex-wrap:wrap">
                    <sc-for list="{{ r.beds }}" as="b" hint-placeholder-count="3">
                      <span style="{{ b.style }}" title="{{ b.title }}"></span>
                    </sc-for>
                  </div>
                </sc-if>
                <sc-if value="{{ r.noBeds }}" hint-placeholder-val="{{ false }}">
                  <p style="margin:0;font-size:12px;color:#a9a19e">No beds yet</p>
                </sc-if>
                <div style="display:flex;gap:12px;padding-top:4px;border-top:1px solid #eeedec">
                  <button onClick="{{ r.manage }}" style="font-size:13px;font-weight:500;color:#21508c;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">{{ r.manageLabel }}</button>
                  <button style="font-size:13px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button>
                </div>
              </div>
            </sc-for>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Manage beds modal -->
  <sc-if value="{{ modalOpen }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ closeModal }}" style="position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:20">
      <div onClick="{{ stopClick }}" style="background:#ffffff;border-radius:12px;padding:24px;width:100%;max-width:448px;box-sizing:border-box;display:flex;flex-direction:column;gap:16px;box-shadow:0 20px 25px -5px rgba(46,42,41,.2);max-height:90vh;overflow-y:auto">
        <h2 style="margin:0;font-weight:600;color:#2e2a29;font-size:18px;letter-spacing:-0.01em">{{ modalTitle }}</h2>
        <ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column">
          <sc-for list="{{ modalBeds }}" as="b" hint-placeholder-count="3">
            <li style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #eeedec">
              <div style="display:flex;align-items:center;gap:10px">
                <span style="{{ b.chipStyle }}"></span>
                <span style="font-size:14px;color:#5c5551">{{ b.name }}</span>
                <span style="font-size:12px;color:#a9a19e">{{ b.stateLabel }}</span>
              </div>
              <sc-if value="{{ b.removable }}" hint-placeholder-val="{{ true }}">
                <button onClick="{{ b.remove }}" style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Remove</button>
              </sc-if>
            </li>
          </sc-for>
        </ul>
        <p style="margin:0;font-size:12px;color:#877d78">Beds with an active booking can't be removed.</p>
        <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:8px">
          <button onClick="{{ addBed }}" style="display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-weight:500;padding:8px 16px;font-size:14px;background:#ffffff;color:#5c5551;border:1px solid #c5c1be;cursor:pointer;font-family:inherit" style-hover="background:#f8f7f7">Add Bed</button>
          <button onClick="{{ closeModal }}" style="display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-weight:500;padding:8px 16px;font-size:14px;background:#c11524;color:#ffffff;border:none;cursor:pointer;box-shadow:0 1px 2px rgba(193,21,36,.25);font-family:inherit" style-hover="background:#9c111d">Done</button>
        </div>
      </div>
    </div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    stepper: 2,
    filter: 'All',
    manageIdx: null,
    rooms: [
      { name: 'Room 101', location: 'Mess Jakarta', beds: [{ n: 'Bed A', b: true }, { n: 'Bed B', b: true }, { n: 'Bed C', b: false }, { n: 'Bed D', b: false }] },
      { name: 'Room 102', location: 'Mess Jakarta', beds: [{ n: 'Bed A', b: true }, { n: 'Bed B', b: true }, { n: 'Bed C', b: true }] },
      { name: 'Room 103', location: 'Mess Surabaya', beds: [{ n: 'Bed A', b: false }, { n: 'Bed B', b: false }] },
      { name: 'Room 104', location: 'Mess Surabaya', beds: [{ n: 'Bed A', b: true }, { n: 'Bed B', b: false }, { n: 'Bed C', b: false }, { n: 'Bed D', b: false }] },
      { name: 'Room 201', location: 'Mess Batam', beds: [] },
    ],
  };

  renderVals() {
    const { stepper, filter, manageIdx, rooms } = this.state;

    const badge = {
      Empty: { bg: '#e3f7eb', fg: '#1c5f34', ring: 'rgba(48,166,91,.3)', dot: '#30a65b' },
      Occupied: { bg: '#fcf1de', fg: '#714b09', ring: 'rgba(198,131,16,.3)', dot: '#c68310' },
      Full: { bg: '#fae0e2', fg: '#691116', ring: 'rgba(184,30,38,.3)', dot: '#b81e26' },
    };
    const statusOf = (r) => {
      if (r.beds.length === 0 || r.beds.every((b) => !b.b)) return 'Empty';
      if (r.beds.every((b) => b.b)) return 'Full';
      return 'Occupied';
    };
    const bookedChip = { height: '16px', width: '16px', borderRadius: '4px', background: '#c68310', flexShrink: 0 };
    const freeChip = { height: '16px', width: '16px', borderRadius: '4px', border: '1.5px solid #c5c1be', background: '#ffffff', boxSizing: 'border-box', flexShrink: 0 };

    const chipBase = { padding: '4px 12px', fontSize: '13px', fontWeight: 500, borderRadius: '9999px', border: 'none', cursor: 'pointer', fontFamily: 'inherit', transition: 'background-color .15s' };
    const filters = ['All', 'Mess Jakarta', 'Mess Surabaya', 'Mess Batam'];
    const filterChips = filters.map((f) => ({
      label: f,
      style: f === filter ? { ...chipBase, background: '#2962ae', color: '#ffffff' } : { ...chipBase, background: '#f8f7f7', color: '#726965' },
      onClick: () => this.setState({ filter: f }),
    }));

    const roomCards = rooms
      .map((r, i) => ({ r, i }))
      .filter(({ r }) => filter === 'All' || r.location === filter)
      .map(({ r, i }) => {
        const status = statusOf(r);
        const t = badge[status];
        return {
          name: r.name,
          meta: r.location + ' · ' + r.beds.length + (r.beds.length === 1 ? ' bed' : ' beds'),
          status,
          badgeStyle: { display: 'inline-flex', alignItems: 'center', gap: '6px', padding: '2px 10px', borderRadius: '9999px', fontSize: '12px', fontWeight: 500, background: t.bg, color: t.fg, boxShadow: 'inset 0 0 0 1px ' + t.ring, whiteSpace: 'nowrap', flexShrink: 0 },
          dotStyle: { height: '6px', width: '6px', borderRadius: '9999px', background: t.dot },
          hasBeds: r.beds.length > 0,
          noBeds: r.beds.length === 0,
          beds: r.beds.map((b) => ({ style: b.b ? bookedChip : freeChip, title: b.n + (b.b ? ' — booked' : ' — free') })),
          manageLabel: r.beds.length === 0 ? 'Add beds' : 'Manage beds',
          manage: () => this.setState({ manageIdx: i }),
        };
      });

    const managed = manageIdx !== null ? rooms[manageIdx] : null;
    const modalBeds = managed
      ? managed.beds.map((b, bi) => ({
          name: b.n,
          stateLabel: b.b ? 'Booked' : 'Free',
          chipStyle: b.b ? { ...bookedChip, height: '12px', width: '12px' } : { ...freeChip, height: '12px', width: '12px' },
          removable: !b.b,
          remove: () => this.setState((s) => {
            const next = s.rooms.map((r, ri) => ri === s.manageIdx ? { ...r, beds: r.beds.filter((_, j) => j !== bi) } : r);
            return { rooms: next };
          }),
        }))
      : [];

    return {
      bedCount: stepper,
      bedPreview: Array.from({ length: stepper }, (_, i) => 'Bed ' + String.fromCharCode(65 + i)).join(', '),
      incBeds: () => this.setState((s) => ({ stepper: Math.min(s.stepper + 1, 12) })),
      decBeds: () => this.setState((s) => ({ stepper: Math.max(s.stepper - 1, 1) })),
      filterChips,
      roomCards,
      modalOpen: manageIdx !== null,
      modalTitle: managed ? 'Manage beds — ' + managed.name : '',
      modalBeds,
      addBed: () => this.setState((s) => {
        const next = s.rooms.map((r, ri) => {
          if (ri !== s.manageIdx) return r;
          const letter = String.fromCharCode(65 + r.beds.length);
          return { ...r, beds: [...r.beds, { n: 'Bed ' + letter, b: false }] };
        });
        return { rooms: next };
      }),
      closeModal: () => this.setState({ manageIdx: null }),
      stopClick: (e) => e.stopPropagation(),
    };
  }
}

</script>
</body>
</html>
