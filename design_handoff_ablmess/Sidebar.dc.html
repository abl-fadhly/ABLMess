<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}a{color:#21508c}a:hover{color:#193d6b}</style>
</helmet>
<aside style="width:240px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid #dddbd9;background:#ffffff;position:sticky;top:0;height:100vh;box-sizing:border-box">
  <div style="height:64px;display:flex;align-items:center;gap:8px;padding:0 20px;border-bottom:1px solid #dddbd9;box-sizing:border-box">
    <div style="height:28px;width:28px;border-radius:8px;background:#c11524;display:flex;align-items:center;justify-content:center;color:#ffffff;font-weight:700;font-size:14px">A</div>
    <span style="font-weight:700;color:#2e2a29;letter-spacing:-0.01em;font-size:16px">ABLMess</span>
  </div>
  <nav style="flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="8">
      <a href="{{ it.href }}" style="{{ it.style }}" style-hover="background:#eeedec">
        <svg viewBox="0 0 20 20" fill="currentColor" style="height:16px;width:16px;flex-shrink:0" aria-hidden="true"><path d="{{ it.icon }}"></path></svg>
        {{ it.label }}
      </a>
    </sc-for>
  </nav>
  <div style="padding:12px;border-top:1px solid #dddbd9">
    <div style="display:flex;align-items:center;gap:10px;padding:8px">
      <div style="height:32px;width:32px;border-radius:9999px;background:#e2ecf8;color:#21508c;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">{{ initials }}</div>
      <div style="min-width:0">
        <p style="margin:0;font-size:14px;font-weight:500;color:#2e2a29;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ userName }}</p>
        <p style="margin:0;font-size:12px;color:#877d78">{{ userRole }}</p>
      </div>
    </div>
    <button style="width:100%;margin-top:4px;display:flex;align-items:center;gap:10px;text-align:left;padding:6px 8px;border-radius:8px;font-size:14px;color:#877d78;background:none;border:none;cursor:pointer;font-family:inherit" style-hover="background:#eeedec;color:#2e2a29">
      <svg viewBox="0 0 20 20" fill="currentColor" style="height:16px;width:16px;flex-shrink:0" aria-hidden="true"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
      Dark mode
    </button>
    <button style="width:100%;margin-top:4px;text-align:left;padding:6px 8px;border-radius:8px;font-size:14px;color:#877d78;background:none;border:none;cursor:pointer;font-family:inherit" style-hover="background:#eeedec;color:#2e2a29">Log out</button>
  </div>
</aside>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;240px&quot;,&quot;height&quot;:&quot;800px&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;dashboard&quot;,&quot;requests&quot;,&quot;bookings&quot;,&quot;rooms&quot;,&quot;users&quot;,&quot;logs&quot;,&quot;reference&quot;,&quot;profile&quot;,&quot;my-requests&quot;]},&quot;role&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;staff&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;staff&quot;,&quot;crew&quot;]},&quot;userName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Dewi Lestari&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;userRole&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;GS&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active ?? 'dashboard';
    const role = this.props.role ?? 'staff';
    const icons = {
      dashboard: 'M3 4a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 8a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H4a1 1 0 01-1-1v-4zm8-8a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V4zm0 8a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z',
      requests: 'M4 4a2 2 0 012-2h6.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm6 4a1 1 0 100-2 1 1 0 000 2zm-1 3a1 1 0 011-1h3a1 1 0 110 2h-3a1 1 0 01-1-1zm0 3a1 1 0 011-1h3a1 1 0 110 2h-3a1 1 0 01-1-1zM7 8a1 1 0 011-1h.01a1 1 0 110 2H8a1 1 0 01-1-1zm0 3a1 1 0 011-1h.01a1 1 0 110 2H8a1 1 0 01-1-1zm0 3a1 1 0 011-1h.01a1 1 0 110 2H8a1 1 0 01-1-1z',
      bookings: 'M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zM4 8h12v8H4V8z',
      rooms: 'M10 2a1 1 0 011 1v1.323l3.954 1.582A1 1 0 0116 6.83V17a1 1 0 01-1 1h-3a1 1 0 01-1-1v-3H9v3a1 1 0 01-1 1H5a1 1 0 01-1-1V6.83a1 1 0 01.546-.891L9 4.323V3a1 1 0 011-1z',
      users: 'M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM1.615 16.428a9 9 0 0114.77 0A.75.75 0 0115.75 17H2.25a.75.75 0 01-.635-.572zM17.615 17H15.75a2.25 2.25 0 00-.176-.867 10.98 10.98 0 00-2.94-4.061A6 6 0 0117.615 17z',
      reference: 'M4 3a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1V4a1 1 0 00-1-1H4zm2 3h8a1 1 0 110 2H6a1 1 0 010-2zm0 4h8a1 1 0 110 2H6a1 1 0 010-2zm0 4h4a1 1 0 110 2H6a1 1 0 010-2z',
      logs: 'M4 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0013.414 6L10 2.586A2 2 0 008.586 2H4zm4 8a1 1 0 011-1h.01a1 1 0 110 2H9a1 1 0 01-1-1zm-3 0a1 1 0 011-1h.01a1 1 0 010 2H6a1 1 0 01-1-1zm7-3a1 1 0 100 2h.01a1 1 0 100-2H12zM5 13a1 1 0 000 2h6a1 1 0 100-2H5z',
      profile: 'M10 2a4 4 0 100 8 4 4 0 000-8zM3 18a7 7 0 0114 0 1 1 0 01-1 1H4a1 1 0 01-1-1z',
    };
    const staff = [
      { key: 'dashboard', label: 'Dashboard', href: 'Dashboard.dc.html', icon: icons.dashboard },
      { key: 'requests', label: 'Requests', href: 'Requests.dc.html', icon: icons.requests },
      { key: 'bookings', label: 'Bookings', href: 'Bookings.dc.html', icon: icons.bookings },
      { key: 'rooms', label: 'Rooms', href: 'Rooms.dc.html', icon: icons.rooms },
      { key: 'users', label: 'Users', href: 'Users.dc.html', icon: icons.users },
      { key: 'logs', label: 'Logs', href: 'Logs.dc.html', icon: icons.logs },
      { key: 'reference', label: 'Reference Data', href: 'Reference Data.dc.html', icon: icons.reference },
    ];
    const crew = [{ key: 'my-requests', label: 'My Requests', href: 'My Requests.dc.html', icon: icons.requests }];
    const base = role === 'crew' ? crew : staff;
    const items = base.concat([{ key: 'profile', label: 'Profile', href: 'Profile.dc.html', icon: icons.profile }]);
    const common = { display: 'flex', alignItems: 'center', gap: '10px', padding: '8px 12px', borderRadius: '8px', fontSize: '14px', fontWeight: 500, textDecoration: 'none', transition: 'background-color .15s' };
    const userName = this.props.userName ?? (role === 'crew' ? 'Budi Santoso' : 'Dewi Lestari');
    const userRole = this.props.userRole ?? (role === 'crew' ? 'Crew' : 'GS');
    return {
      items: items.map((it) => ({
        ...it,
        style: it.key === active
          ? { ...common, background: '#f3f7fc', color: '#21508c' }
          : { ...common, color: '#726965' },
      })),
      userName,
      userRole,
      initials: userName.split(' ').map((p) => p[0] ?? '').join('').slice(0, 2).toUpperCase(),
    };
  }
}

</script>
</body>
</html>
