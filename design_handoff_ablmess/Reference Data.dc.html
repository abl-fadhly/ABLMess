<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{margin:0;font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;background:#eeedec;color:#2e2a29;-webkit-font-smoothing:antialiased}a{color:#21508c}a:hover{color:#193d6b}</style>
</helmet>
<div style="min-height:100vh;display:flex;background:#eeedec" data-screen-label="Reference Data">
  <dc-import style="align-self:stretch" name="Sidebar" active="reference" hint-size="240px,100vh"></dc-import>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0">
    <main style="flex:1;padding:32px;max-width:1152px;width:100%;margin:0 auto;box-sizing:border-box">
      <div style="margin-bottom:28px">
        <h1 style="margin:0;font-size:24px;font-weight:700;color:#2e2a29;letter-spacing:-0.01em">Reference Data</h1>
      </div>

      <div style="display:flex;gap:4px;margin-bottom:16px">
        <button onClick="{{ showLocations }}" style="{{ locationsTabStyle }}">Locations</button>
        <button onClick="{{ showShips }}" style="{{ shipsTabStyle }}">Ships</button>
        <button onClick="{{ showJabatans }}" style="{{ jabatansTabStyle }}">Jabatan</button>
      </div>

      <div style="background:#ffffff;border:1px solid rgba(221,219,217,.8);border-radius:12px;box-shadow:0 1px 2px rgba(221,219,217,.4);padding:24px">
        <sc-if value="{{ isLocations }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex;flex-direction:column;gap:16px">
            <div style="display:flex;gap:8px;max-width:512px;flex-wrap:wrap;align-items:flex-start">
              <input type="text" placeholder="Location name" style="flex:1;min-width:160px;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;padding:8px 12px;font-size:14px;color:#2e2a29;box-sizing:border-box;font-family:inherit">
              <input type="text" placeholder="Address" style="flex:1;min-width:160px;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;padding:8px 12px;font-size:14px;color:#2e2a29;box-sizing:border-box;font-family:inherit">
              <button style="display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-weight:500;padding:8px 16px;font-size:14px;background:#c11524;color:#ffffff;border:none;cursor:pointer;box-shadow:0 1px 2px rgba(193,21,36,.25);font-family:inherit" style-hover="background:#9c111d">Add</button>
            </div>
            <ul style="list-style:none;margin:0;padding:0">
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px;border-bottom:1px solid #eeedec"><span style="color:#5c5551">Mess Jakarta <span style="color:#a9a19e">— Jl. Gunung Sahari 45, Jakarta Utara</span></span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px;border-bottom:1px solid #eeedec"><span style="color:#5c5551">Mess Surabaya <span style="color:#a9a19e">— Jl. Perak Timur 512, Surabaya</span></span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px"><span style="color:#5c5551">Mess Batam <span style="color:#a9a19e">— Jl. Duyung Sei Jodoh, Batam</span></span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
            </ul>
          </div>
        </sc-if>

        <sc-if value="{{ isShips }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;flex-direction:column;gap:16px">
            <div style="display:flex;gap:8px;max-width:448px;align-items:flex-start">
              <input type="text" placeholder="Ship name" style="flex:1;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;padding:8px 12px;font-size:14px;color:#2e2a29;box-sizing:border-box;font-family:inherit">
              <button style="display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-weight:500;padding:8px 16px;font-size:14px;background:#c11524;color:#ffffff;border:none;cursor:pointer;box-shadow:0 1px 2px rgba(193,21,36,.25);font-family:inherit" style-hover="background:#9c111d">Add</button>
            </div>
            <ul style="list-style:none;margin:0;padding:0">
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px;border-bottom:1px solid #eeedec"><span style="color:#5c5551">KM Sinar Abadi</span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px;border-bottom:1px solid #eeedec"><span style="color:#5c5551">KM Bahari Jaya</span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px"><span style="color:#5c5551">KM Nusantara</span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
            </ul>
          </div>
        </sc-if>

        <sc-if value="{{ isJabatans }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;flex-direction:column;gap:16px">
            <div style="display:flex;gap:8px;max-width:448px;align-items:flex-start">
              <input type="text" placeholder="Jabatan name" style="flex:1;border-radius:8px;border:1px solid #c5c1be;background:#ffffff;padding:8px 12px;font-size:14px;color:#2e2a29;box-sizing:border-box;font-family:inherit">
              <button style="display:inline-flex;align-items:center;justify-content:center;border-radius:8px;font-weight:500;padding:8px 16px;font-size:14px;background:#c11524;color:#ffffff;border:none;cursor:pointer;box-shadow:0 1px 2px rgba(193,21,36,.25);font-family:inherit" style-hover="background:#9c111d">Add</button>
            </div>
            <ul style="list-style:none;margin:0;padding:0">
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px;border-bottom:1px solid #eeedec"><span style="color:#5c5551">Kapten</span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px;border-bottom:1px solid #eeedec"><span style="color:#5c5551">Mualim I</span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px;border-bottom:1px solid #eeedec"><span style="color:#5c5551">KKM</span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
              <li style="padding:10px 0;display:flex;justify-content:space-between;font-size:14px"><span style="color:#5c5551">Juru Masak</span><button style="font-size:14px;font-weight:500;color:#691116;background:none;border:none;cursor:pointer;padding:0;font-family:inherit" style-hover="text-decoration:underline">Delete</button></li>
            </ul>
          </div>
        </sc-if>
      </div>
    </main>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { tab: 'locations' };
  renderVals() {
    const tab = this.state.tab;
    const base = { padding: '6px 14px', fontSize: '14px', fontWeight: 500, borderRadius: '8px', border: 'none', cursor: 'pointer', fontFamily: 'inherit', transition: 'background-color .15s' };
    const activeStyle = { ...base, background: '#2962ae', color: '#ffffff' };
    const idleStyle = { ...base, background: 'transparent', color: '#726965' };
    return {
      isLocations: tab === 'locations',
      isShips: tab === 'ships',
      isJabatans: tab === 'jabatans',
      locationsTabStyle: tab === 'locations' ? activeStyle : idleStyle,
      shipsTabStyle: tab === 'ships' ? activeStyle : idleStyle,
      jabatansTabStyle: tab === 'jabatans' ? activeStyle : idleStyle,
      showLocations: () => this.setState({ tab: 'locations' }),
      showShips: () => this.setState({ tab: 'ships' }),
      showJabatans: () => this.setState({ tab: 'jabatans' }),
    };
  }
}

</script>
</body>
</html>
